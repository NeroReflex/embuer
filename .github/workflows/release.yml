name: Release

on:
  push:
    tags:        
      - '*'

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust nightly
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --default-toolchain nightly -y
        source $HOME/.cargo/env
    - name: Install clang-sys Dependencies
      run: sudo apt-get install -y clang llvm lld libclang-dev libssl-dev pkg-config
    - name: Build
      run: cargo build --verbose

  bookworm_build:
    runs-on: ubuntu-latest
    container: 
      image: debian:bookworm
      volumes:
        - /usr:/usr-host
        - /opt:/opt-host
      options: --privileged
    steps:
    - name: Maximize build space
      run: |
        df -h
        rm -rf /usr-host/share/dotnet
        rm -rf /usr-host/share/swift
        rm -rf /usr-host/share/java
        rm -rf /usr-host/local/lib/android
        rm -rf /opt-host/ghc
        rm -rf /opt-host/hostedtoolcache
        rm -rf /opt-host/az
        df -h
    - uses: actions/checkout@v4
    - name: Update system
      run: |
        apt-get update -y
        apt-get upgrade -y
    - name: Install Basic Software
      run: apt-get install -y sudo curl
    - name: Install Build Dependencies
      run: apt-get install -y build-essential devscripts debhelper
    - name: Install clang-sys Dependencies
      run: apt-get install -y clang llvm lld libclang-dev libssl-dev pkg-config
    - name: Install Rust toolchain
      run: |
        # Use Fedora-packaged Rust and Cargo so RPM builds use distro toolchain
        dnf install -y rust cargo
    - name: Build deb
      run: |
        . $HOME/.cargo/env
        export PATH="$HOME/.cargo/bin:$PATH"
        cargo install cargo-deb
        cargo deb
    - name: Move debs
      run: |
        mv target/debian/*.deb .
        for file in *.deb; do mv "$file" "${file%.deb}.bookworm.deb"; done
    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: bookworm-package
        path: |
          *.deb
        if-no-files-found: error

  trixie_build:
    runs-on: ubuntu-latest
    container: 
      image: debian:trixie
      volumes:
        - /usr:/usr-host
        - /opt:/opt-host
      options: --privileged
    steps:
    - name: Maximize build space
      run: |
        df -h
        rm -rf /usr-host/share/dotnet
        rm -rf /usr-host/share/swift
        rm -rf /usr-host/share/java
        rm -rf /usr-host/local/lib/android
        rm -rf /opt-host/ghc
        rm -rf /opt-host/hostedtoolcache
        rm -rf /opt-host/az
        df -h
    - uses: actions/checkout@v4
    - name: Update system
      run: |
        apt-get update -y
        apt-get upgrade -y
    - name: Install Basic Software
      run: apt-get install -y sudo curl
    - name: Install Build Dependencies
      run: apt-get install -y build-essential devscripts debhelper
    - name: Install clang-sys Dependencies
      run: apt-get install -y clang llvm lld libclang-dev libssl-dev pkg-config
    - name: Install Rust toolchain
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --default-toolchain stable -y
    - name: Build deb
      run: |
        . $HOME/.cargo/env
        export PATH="$HOME/.cargo/bin:$PATH"
        cargo install cargo-deb
        cargo deb
    - name: Move debs
      run: |
        mv target/debian/*.deb .
        for file in *.deb; do mv "$file" "${file%.deb}.trixie.deb"; done
    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: trixie-package
        path: |
          *.deb
        if-no-files-found: error

  arch_build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
    - name: Maximize build space
      run: |
        df -h || true
    - uses: actions/checkout@v4
    - name: Update system
      run: |
        pacman -Syu --noconfirm || true
    - name: Install Build Dependencies
      run: |
        pacman -S --noconfirm base-devel clang pkgconf openssl make curl git || true
    - name: Install Rust toolchain
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --default-toolchain stable -y
    - name: Make tarball
      run: |
        . $HOME/.cargo/env
        export PATH="$HOME/.cargo/bin:$PATH"
        VERSION=${GITHUB_REF#refs/*/}
        destdir="$PWD/embuer-${VERSION}"
        rm -rf "$destdir"
        make DESTDIR="$destdir" install
        tar -C "$(dirname "$destdir")" -czf "embuer-${VERSION}.tar.gz" "$(basename "$destdir")"
    - name: Upload tarball artifact
      uses: actions/upload-artifact@v4
      with:
        name: arch-tarball
        path: |
          *.tar.gz
        if-no-files-found: error

  fedora_build:
    runs-on: ubuntu-latest
    container:
      image: fedora:43
      volumes:
        - /usr:/usr-host
        - /opt:/opt-host
      options: --privileged
    steps:
    - name: Maximize build space
      run: |
        df -h
        rm -rf /usr-host/share/dotnet || true
        rm -rf /usr-host/share/swift || true
        rm -rf /usr-host/share/java || true
        rm -rf /usr-host/local/lib/android || true
        rm -rf /opt-host/ghc || true
        rm -rf /opt-host/hostedtoolcache || true
        rm -rf /opt-host/az || true
        df -h
    - uses: actions/checkout@v4
    - name: Update system
      run: |
        dnf -y update || true
    - name: Install Basic Software
      run: dnf install -y sudo curl
    - name: Install Build Dependencies
      run: dnf install -y rpm-build redhat-rpm-config make gcc clang pkgconfig openssl-devel
    - name: Install Rust toolchain
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --default-toolchain stable -y
    - name: Prepare rpmbuild and build RPM
      run: |
        mkdir -p rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
        cp rpm/embuer.spec rpmbuild/SPECS/
        rpmbuild --define "_topdir $PWD/rpmbuild" --define "_sourcedir $PWD" --define "version ${GITHUB_REF#refs/*/}" -ba rpmbuild/SPECS/embuer.spec
    - name: Move rpms
      run: |
        mv rpmbuild/RPMS/*/*.rpm . || true
    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: fedora-package
        path: |
          *.rpm
        if-no-files-found: error

  make-release:
    runs-on: ubuntu-latest

    needs: [prepare, bookworm_build, trixie_build, arch_build, fedora_build]
    steps:
      - name: Download debian bookworm artifacts
        uses: actions/download-artifact@v4
        with:
          name: bookworm-package
          path: ${{ env.PKGDEST }}
      - name: Download debian trixie artifacts
        uses: actions/download-artifact@v4
        with:
          name: trixie-package
          path: ${{ env.PKGDEST }}
      - name: Download fedora artifacts
        uses: actions/download-artifact@v4
        with:
          name: fedora-package
          path: ${{ env.PKGDEST }}
      - name: Download arch tarball
        uses: actions/download-artifact@v4
        with:
          name: arch-tarball
          path: ${{ env.PKGDEST }}
      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Make release
        uses: softprops/action-gh-release@v2
        with:
          name: embuer v${{ env.RELEASE_VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            *.deb
            *.rpm
            *.tar.gz